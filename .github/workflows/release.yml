name: Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$GITHUB_REF#refs/tags/" >> $GITHUB_OUTPUT
      
      - name: Auto-increment versionCode
        run: |
          # 解析 versionName (格式: major.minor.patch)
          VERSION_NAME="${{ steps.version.outputs.version }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION_NAME"
          
          # 计算 versionCode: major × 10000 + minor × 100 + patch
          # 规则: 每次递增1，满10向前1位进1
          NEW_VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          
          echo "📊 版本信息:"
          echo "  versionName: $VERSION_NAME"
          echo "  versionCode: $NEW_VERSION_CODE"
          echo "  计算公式: $MAJOR × 10000 + $MINOR × 100 + $PATCH = $NEW_VERSION_CODE"
          
          # 更新 build.gradle.kts 中的 versionCode
          sed -i "s/versionCode = .*/versionCode = $NEW_VERSION_CODE/" app/build.gradle.kts
          sed -i "s/versionName = .*/versionName = \"$VERSION_NAME\"/" app/build.gradle.kts
          
          echo "✅ 已更新 build.gradle.kts:"
          grep -E "versionCode|versionName" app/build.gradle.kts
      
      - name: Build Release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease
      
      - name: Commit version update
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add app/build.gradle.kts
          git commit -m "chore: auto-update versionCode to match ${{ steps.version.outputs.version }}" || echo "No changes to commit"
          git push || echo "Push skipped (protected branch or no changes)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Verify APK exists
        run: |
          if [ -f "app/build/outputs/apk/release/TinyLedger-v${{ steps.version.outputs.version }}-release.apk" ]; then
            echo "✅ APK built successfully"
            ls -lh app/build/outputs/apk/release/*.apk
          else
            echo "❌ APK not found"
            exit 1
          fi
      
      - name: Create Release
        uses: actions/create-release@v1
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
      
      - name: Upload APK to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./app/build/outputs/apk/release/TinyLedger-v${{ steps.version.outputs.version }}-release.apk
          asset_name: TinyLedger-v${{ steps.version.outputs.version }}-release.apk
          asset_content_type: application/vnd.android.package-archive
      
      - name: Mark as latest release
        uses: actions/github-script@v7
        with:
          script: |
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            
            const currentRelease = releases.data.find(r => 
              r.tag_name === context.ref.replace('refs/tags/', '')
            );
            
            if (currentRelease) {
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: currentRelease.id,
                make_latest: true,
              });
              
              console.log(`✅ Release ${currentRelease.tag_name} marked as latest`);
            }
